services:
  api:
    image: greenlens-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:80"
    env_file:
      - ./backend/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ALLOW_DEV_AUTH: "true"
      USE_IN_MEMORY_CHILD_PROFILES: "false"
      USE_IN_MEMORY_AUTH: ${USE_IN_MEMORY_AUTH:-true}
      ENABLE_DEV_ADMIN_SEED: ${ENABLE_DEV_ADMIN_SEED:-true}
      DEV_ADMIN_USERNAME: ${DEV_ADMIN_USERNAME:-admin}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD:-Admin@123}
      CHILD_PROFILES_TABLE_NAME: ${CHILD_PROFILES_TABLE_NAME:-GreenLens-ChildProfiles}
    restart: unless-stopped

  frontend:
    image: greenlens-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  admin-web:
    image: greenlens-admin-web:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.admin
    ports:
      - "3001:80"
    depends_on:
      - api
    restart: unless-stopped
