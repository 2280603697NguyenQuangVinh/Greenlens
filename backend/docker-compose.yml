version: '3.8'

services:
  # Backend API Service
  api:
    image: greenlens-api:latest
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "5001:80"

    env_file:
      - .env

    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - USE_IN_MEMORY_CHILD_PROFILES=true

    restart: unless-stopped
