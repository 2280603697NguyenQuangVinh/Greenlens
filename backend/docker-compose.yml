version: '3.8'

services:
  # Backend API Service
  api:
    image: greenlens-api:latest
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "5001:80"

    env_file:
      - .env

    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ALLOW_DEV_AUTH=true
      - USE_IN_MEMORY_CHILD_PROFILES=false
      - USE_IN_MEMORY_AUTH=${USE_IN_MEMORY_AUTH:-false}
      - CHILD_PROFILES_TABLE_NAME=${CHILD_PROFILES_TABLE_NAME:-GreenLens-ChildProfiles}
      - BEDROCK_MAX_TOKENS=${BEDROCK_MAX_TOKENS:-180}
      - AI_CAMERA_GUIDANCE_FALLBACK_ENABLED=${AI_CAMERA_GUIDANCE_FALLBACK_ENABLED:-true}
      - AI_CAMERA_SKIP_BEDROCK_WHEN_FALLBACK_ENABLED=${AI_CAMERA_SKIP_BEDROCK_WHEN_FALLBACK_ENABLED:-true}

    restart: unless-stopped

  # Frontend Web Service
  frontend:
    image: greenlens-frontend:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile

    ports:
      - "3000:80"

    depends_on:
      - api

    restart: unless-stopped
