service: greenlens-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: dotnet8
  region: ${opt:region, 'ap-southeast-1'}
  stage: ${opt:stage, 'dev'}
  environment:
    CHILD_PROFILES_TABLE_NAME: GreenLens-ChildProfiles
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
          Resource:
            - Fn::GetAtt:
                - ChildProfilesTable
                - Arn
        - Effect: Allow
          Action:
            - cognito-idp:AdminCreateUser
          Resource:
            - Fn::Sub: arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${env:COGNITO_USER_POOL_ID}

package:
  artifact: bin/Release/net8.0/greenlens-api.zip

functions:
  createChildProfile:
    handler: GreenLens.Api::GreenLens.Api.Functions.ChildProfileFunction::CreateAsync
    events:
      - http:
          path: child-profiles
          method: post
          cors: true

resources:
  Resources:
    ChildProfilesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: GreenLens-ChildProfiles
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: childId
            AttributeType: S
          - AttributeName: cognitoSub
            AttributeType: S
        KeySchema:
          - AttributeName: childId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: GSI-cognitoSub
            KeySchema:
              - AttributeName: cognitoSub
                KeyType: HASH
            Projection:
              ProjectionType: ALL
