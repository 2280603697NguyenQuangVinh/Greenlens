service: greenlens-backend

frameworkVersion: '3'
configValidationMode: warn

custom:
  cognitoAuthorizerArn: arn:aws:cognito-idp:${aws:region}:${aws:accountId}:userpool/${env:COGNITO_USER_POOL_ID}
  operationsAlertsTopicArn: arn:aws:sns:${aws:region}:${aws:accountId}:GreenLens-OperationsAlerts-${sls:stage}

provider:
  name: aws
  runtime: dotnet8
  region: ${opt:region, 'ap-southeast-1'}
  stage: ${opt:stage, 'dev'}
  logRetentionInDays: ${env:CLOUDWATCH_LOG_RETENTION_DAYS, '14'}
  logs:
    restApi:
      accessLogging: true
      executionLogging: true
      level: INFO
      fullExecutionData: false
      format: '{ "requestId":"$context.requestId", "ip":"$context.identity.sourceIp", "caller":"$context.identity.caller", "user":"$context.identity.user", "requestTime":"$context.requestTime", "httpMethod":"$context.httpMethod", "resourcePath":"$context.resourcePath", "status":"$context.status", "protocol":"$context.protocol", "responseLength":"$context.responseLength", "integrationLatency":"$context.integrationLatency" }'
  environment:
    CHILD_PROFILES_TABLE_NAME: GreenLens-ChildProfiles
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_APP_CLIENT_ID: ${env:COGNITO_APP_CLIENT_ID}
    COGNITO_APP_CLIENT_SECRET: ${env:COGNITO_APP_CLIENT_SECRET, ''}
    AI_CAMERA_BUCKET_NAME: ${env:AI_CAMERA_BUCKET_NAME}
    BEDROCK_MODEL_ID: ${env:BEDROCK_MODEL_ID, 'amazon.nova-lite-v1:0'}
    BEDROCK_MAX_TOKENS: ${env:BEDROCK_MAX_TOKENS, '180'}
    BEDROCK_TIMEOUT_SECONDS: ${env:BEDROCK_TIMEOUT_SECONDS, '12'}
    AI_CAMERA_GUIDANCE_FALLBACK_ENABLED: ${env:AI_CAMERA_GUIDANCE_FALLBACK_ENABLED, 'true'}
    AI_CAMERA_SKIP_BEDROCK_WHEN_FALLBACK_ENABLED: ${env:AI_CAMERA_SKIP_BEDROCK_WHEN_FALLBACK_ENABLED, 'true'}
    AI_CAMERA_USAGE_LIMITER_ENABLED: ${env:AI_CAMERA_USAGE_LIMITER_ENABLED, 'true'}
    AI_CAMERA_USAGE_TABLE_NAME: GreenLens-AiUsage
    AI_CAMERA_PER_MINUTE_LIMIT: ${env:AI_CAMERA_PER_MINUTE_LIMIT, '3'}
    AI_CAMERA_DAILY_LIMIT: ${env:AI_CAMERA_DAILY_LIMIT, '30'}
    REKOGNITION_MAX_LABELS: ${env:REKOGNITION_MAX_LABELS, '25'}
    REKOGNITION_MIN_CONFIDENCE: ${env:REKOGNITION_MIN_CONFIDENCE, '35'}
    REKOGNITION_TIMEOUT_SECONDS: ${env:REKOGNITION_TIMEOUT_SECONDS, '5'}
    REKOGNITION_CIRCUIT_FAILURE_THRESHOLD: ${env:REKOGNITION_CIRCUIT_FAILURE_THRESHOLD, '3'}
    REKOGNITION_CIRCUIT_BREAK_SECONDS: ${env:REKOGNITION_CIRCUIT_BREAK_SECONDS, '60'}
    QUIZ_BEDROCK_MODEL_ID: ${env:QUIZ_BEDROCK_MODEL_ID, 'apac.amazon.nova-micro-v1:0'}
    QUIZ_BEDROCK_MAX_TOKENS: ${env:QUIZ_BEDROCK_MAX_TOKENS, '700'}
    QUIZ_BEDROCK_TIMEOUT_SECONDS: ${env:QUIZ_BEDROCK_TIMEOUT_SECONDS, '10'}
    QUIZ_SESSIONS_TABLE_NAME: GreenLens-QuizSessions
    QUIZ_FALLBACK_TABLE_NAME: GreenLens-QuizFallbacks
    QUIZ_POOL_TABLE_NAME: GreenLens-QuizPool
    QUIZ_POOL_REFILL_FUNCTION_NAME: ${self:service}-${sls:stage}-quizPoolRefill
    QUIZ_POOL_TARGET_READY_COUNT: ${env:QUIZ_POOL_TARGET_READY_COUNT, '5'}
    QUIZ_POOL_REFILL_THRESHOLD: ${env:QUIZ_POOL_REFILL_THRESHOLD, '2'}
    QUIZ_POOL_ITEM_TTL_DAYS: ${env:QUIZ_POOL_ITEM_TTL_DAYS, '14'}
    QUIZ_DEFAULT_AGE: ${env:QUIZ_DEFAULT_AGE, '8'}
    MINI_GAME_RESULTS_TABLE_NAME: GreenLens-MiniGameResults
    MINI_GAME_ITEMS_TABLE_NAME: GreenLens-MiniGameItems
    MINI_GAME_ASSET_BUCKET_NAME: ${env:MINI_GAME_ASSET_BUCKET_NAME, ''}
    MINI_GAME_ASSET_BASE_URL: ${env:MINI_GAME_ASSET_BASE_URL, ''}
  apiGateway:
    binaryMediaTypes:
      - multipart/form-data
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GreenLens-ChildProfiles
            - Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GreenLens-QuizSessions
            - Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GreenLens-QuizFallbacks
            - Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GreenLens-QuizPool
            - Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GreenLens-MiniGameResults
            - Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GreenLens-MiniGameResults/index/*
            - Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GreenLens-MiniGameItems
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - Fn::Sub: arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${self:service}-${sls:stage}-quizPoolRefill
        - Effect: Allow
          Action:
            - dynamodb:Scan
            - dynamodb:DeleteItem
            - dynamodb:UpdateItem
          Resource:
            - Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GreenLens-AiUsage
        - Effect: Allow
          Action:
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:AdminInitiateAuth
            - cognito-idp:InitiateAuth
            - cognito-idp:ListUsers
          Resource:
            - Fn::Sub: arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${env:COGNITO_USER_POOL_ID}
        - Effect: Allow
          Action:
            - s3:PutObject
          Resource:
            - Fn::Sub: arn:aws:s3:::${env:AI_CAMERA_BUCKET_NAME}/uploads/*
        - Effect: Allow
          Action:
            - rekognition:DetectLabels
            - rekognition:DetectText
          Resource: "*"
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:Converse
          Resource: "*"

package:
  artifact: bin/Release/net8.0/greenlens-api.zip

functions:
  authRegister:
    handler: GreenLens.Api::GreenLens.Api.Functions.AuthFunction::RegisterAsync
    events:
      - http:
          path: auth/register
          method: post
          cors: true
  authRegisterChild:
    handler: GreenLens.Api::GreenLens.Api.Functions.AuthFunction::RegisterChildAsync
    events:
      - http:
          path: auth/register-child
          method: post
          cors: true
  authLogin:
    handler: GreenLens.Api::GreenLens.Api.Functions.AuthFunction::LoginAsync
    events:
      - http:
          path: auth/login
          method: post
          cors: true
  authRefresh:
    handler: GreenLens.Api::GreenLens.Api.Functions.AuthFunction::RefreshAsync
    events:
      - http:
          path: auth/refresh
          method: post
          cors: true
  authGuestLogin:
    handler: GreenLens.Api::GreenLens.Api.Functions.AuthFunction::GuestLoginAsync
    events:
      - http:
          path: auth/guest-login
          method: post
          cors: true
  createChildProfile:
    handler: GreenLens.Api::GreenLens.Api.Functions.ChildProfileFunction::CreateAsync
    events:
      - http:
          path: child-profiles
          method: post
          cors: true
          authorizer:
            arn: ${self:custom.cognitoAuthorizerArn}
  getChildProfile:
    handler: GreenLens.Api::GreenLens.Api.Functions.ChildProfileFunction::GetAsync
    events:
      - http:
          path: child-profiles/{childId}
          method: get
          cors: true
          authorizer:
            arn: ${self:custom.cognitoAuthorizerArn}
  getChildProfileLeaderboard:
    handler: GreenLens.Api::GreenLens.Api.Functions.ChildProfileFunction::GetLeaderboardAsync
    events:
      - http:
          path: child-profiles/leaderboard
          method: get
          cors: true
          authorizer:
            arn: ${self:custom.cognitoAuthorizerArn}
  getChildProfileStreak:
    handler: GreenLens.Api::GreenLens.Api.Functions.ChildProfileFunction::GetStreakAsync
    events:
      - http:
          path: child-profiles/{childId}/streak
          method: get
          cors: true
          authorizer:
            arn: ${self:custom.cognitoAuthorizerArn}
  checkInChildProfileStreak:
    handler: GreenLens.Api::GreenLens.Api.Functions.ChildProfileFunction::CheckInStreakAsync
    events:
      - http:
          path: child-profiles/{childId}/streak/check-in
          method: post
          cors: true
          authorizer:
            arn: ${self:custom.cognitoAuthorizerArn}
  adminApi:
    handler: GreenLens.Api::GreenLens.Api.Functions.AdminFunction::HandleAsync
    events:
      - http:
          path: admin/{proxy+}
          method: any
          cors: true
          authorizer:
            arn: ${self:custom.cognitoAuthorizerArn}
  aiCameraAnalyze:
    handler: GreenLens.Api::GreenLens.Api.Functions.AiCameraFunction::AnalyzeAsync
    timeout: 20
    events:
      - http:
          path: ai-camera/analyze
          method: post
          cors: true
          authorizer:
            arn: ${self:custom.cognitoAuthorizerArn}
  quizGenerate:
    handler: GreenLens.Api::GreenLens.Api.Functions.QuizFunction::GenerateAsync
    events:
      - http:
          path: quiz/generate
          method: post
          cors: true
          authorizer:
            arn: ${self:custom.cognitoAuthorizerArn}
  quizGetSession:
    handler: GreenLens.Api::GreenLens.Api.Functions.QuizFunction::GetSessionAsync
    events:
      - http:
          path: quiz/sessions/{sessionId}
          method: get
          cors: true
          authorizer:
            arn: ${self:custom.cognitoAuthorizerArn}
  quizComplete:
    handler: GreenLens.Api::GreenLens.Api.Functions.QuizFunction::CompleteAsync
    events:
      - http:
          path: quiz/complete
          method: post
          cors: true
          authorizer:
            arn: ${self:custom.cognitoAuthorizerArn}
  quizPoolRefill:
    handler: GreenLens.Api::GreenLens.Api.Functions.QuizFunction::RefillAsync
    timeout: 60
  miniGameTrashSortItems:
    handler: GreenLens.Api::GreenLens.Api.Functions.MiniGameFunction::GetTrashSortItemsAsync
    events:
      - http:
          path: mini-games/trash-sort/items
          method: get
          cors: true
          authorizer:
            arn: ${self:custom.cognitoAuthorizerArn}
  miniGameTrashSortResult:
    handler: GreenLens.Api::GreenLens.Api.Functions.MiniGameFunction::SubmitTrashSortResultAsync
    events:
      - http:
          path: mini-games/trash-sort/results
          method: post
          cors: true
          authorizer:
            arn: ${self:custom.cognitoAuthorizerArn}

resources:
  Resources:
    ApiGatewayResponseDefault4xx:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        RestApiId:
          Ref: ApiGatewayRestApi
        ResponseType: DEFAULT_4XX
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent,X-Amzn-Trace-Id'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"

    ApiGatewayResponseDefault5xx:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        RestApiId:
          Ref: ApiGatewayRestApi
        ResponseType: DEFAULT_5XX
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent,X-Amzn-Trace-Id'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"

    ApiGatewayResponseUnauthorized:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        RestApiId:
          Ref: ApiGatewayRestApi
        ResponseType: UNAUTHORIZED
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent,X-Amzn-Trace-Id'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"

    ApiGatewayResponseAccessDenied:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        RestApiId:
          Ref: ApiGatewayRestApi
        ResponseType: ACCESS_DENIED
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent,X-Amzn-Trace-Id'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"

    QuizPoolTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: GreenLens-QuizPool
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: childId
            AttributeType: S
          - AttributeName: quizSetId
            AttributeType: S
        KeySchema:
          - AttributeName: childId
            KeyType: HASH
          - AttributeName: quizSetId
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true

    GreenLensApiWebAcl:
      Type: AWS::WAFv2::WebACL
      Properties:
        Name: GreenLensApiWebAcl-${sls:stage}
        Scope: REGIONAL
        DefaultAction:
          Allow: {}
        VisibilityConfig:
          CloudWatchMetricsEnabled: true
          MetricName: GreenLensApiWebAcl
          SampledRequestsEnabled: true
        Rules:
          - Name: AWSManagedCommonRules
            Priority: 0
            OverrideAction:
              None: {}
            Statement:
              ManagedRuleGroupStatement:
                VendorName: AWS
                Name: AWSManagedRulesCommonRuleSet
                ScopeDownStatement:
                  NotStatement:
                    Statement:
                      ByteMatchStatement:
                        SearchString: /ai-camera/analyze
                        FieldToMatch:
                          UriPath: {}
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
                        PositionalConstraint: ENDS_WITH
            VisibilityConfig:
              CloudWatchMetricsEnabled: true
              MetricName: AWSManagedCommonRules
              SampledRequestsEnabled: true
          - Name: AWSManagedKnownBadInputs
            Priority: 1
            OverrideAction:
              None: {}
            Statement:
              ManagedRuleGroupStatement:
                VendorName: AWS
                Name: AWSManagedRulesKnownBadInputsRuleSet
            VisibilityConfig:
              CloudWatchMetricsEnabled: true
              MetricName: AWSManagedKnownBadInputs
              SampledRequestsEnabled: true
          - Name: AWSManagedAmazonIpReputation
            Priority: 2
            OverrideAction:
              None: {}
            Statement:
              ManagedRuleGroupStatement:
                VendorName: AWS
                Name: AWSManagedRulesAmazonIpReputationList
            VisibilityConfig:
              CloudWatchMetricsEnabled: true
              MetricName: AWSManagedAmazonIpReputation
              SampledRequestsEnabled: true
          - Name: AiCameraAnalyzeIpRateLimit
            Priority: 3
            Action:
              Block: {}
            Statement:
              RateBasedStatement:
                Limit: 100
                AggregateKeyType: IP
                ScopeDownStatement:
                  ByteMatchStatement:
                    SearchString: /ai-camera/analyze
                    FieldToMatch:
                      UriPath: {}
                    TextTransformations:
                      - Priority: 0
                        Type: NONE
                    PositionalConstraint: EXACTLY
            VisibilityConfig:
              CloudWatchMetricsEnabled: true
              MetricName: AiCameraAnalyzeIpRateLimit
              SampledRequestsEnabled: true
          - Name: GlobalIpRateLimit
            Priority: 4
            Action:
              Block: {}
            Statement:
              RateBasedStatement:
                Limit: 300
                AggregateKeyType: IP
            VisibilityConfig:
              CloudWatchMetricsEnabled: true
              MetricName: GlobalIpRateLimit
              SampledRequestsEnabled: true

    AiCameraAnalyzeErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: GreenLens-${sls:stage}-AiCameraAnalyze-Errors
        AlarmDescription: AI Camera Lambda has one or more errors in 5 minutes.
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value:
              Ref: AiCameraAnalyzeLambdaFunction
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        DatapointsToAlarm: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - ${self:custom.operationsAlertsTopicArn}

    AiCameraAnalyzeDurationAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: GreenLens-${sls:stage}-AiCameraAnalyze-Duration
        AlarmDescription: AI Camera Lambda average duration is above 25 seconds.
        Namespace: AWS/Lambda
        MetricName: Duration
        Dimensions:
          - Name: FunctionName
            Value:
              Ref: AiCameraAnalyzeLambdaFunction
        Statistic: Average
        Period: 300
        EvaluationPeriods: 1
        DatapointsToAlarm: 1
        Threshold: 25000
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - ${self:custom.operationsAlertsTopicArn}

    QuizGenerateErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: GreenLens-${sls:stage}-QuizGenerate-Errors
        AlarmDescription: Quiz generation Lambda has one or more errors in 5 minutes.
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value:
              Ref: QuizGenerateLambdaFunction
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        DatapointsToAlarm: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - ${self:custom.operationsAlertsTopicArn}

    MiniGameTrashSortResultErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: GreenLens-${sls:stage}-MiniGameTrashSortResult-Errors
        AlarmDescription: Trash sort result Lambda has one or more errors in 5 minutes.
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value:
              Ref: MiniGameTrashSortResultLambdaFunction
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        DatapointsToAlarm: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - ${self:custom.operationsAlertsTopicArn}

    GreenLensOperationsDashboard:
      Type: AWS::CloudWatch::Dashboard
      Properties:
        DashboardName: GreenLens-${sls:stage}-Operations
        DashboardBody:
          Fn::Sub:
            - |
              {
                "widgets": [
                  {
                    "type": "metric",
                    "x": 0,
                    "y": 0,
                    "width": 12,
                    "height": 6,
                    "properties": {
                      "title": "Lambda Errors",
                      "region": "${AWS::Region}",
                      "view": "timeSeries",
                      "stacked": false,
                      "metrics": [
                        [ "AWS/Lambda", "Errors", "FunctionName", "${AiCameraFunctionName}", { "stat": "Sum" } ],
                        [ ".", ".", ".", "${QuizGenerateFunctionName}", { "stat": "Sum" } ],
                        [ ".", ".", ".", "${MiniGameTrashSortResultFunctionName}", { "stat": "Sum" } ]
                      ],
                      "period": 300
                    }
                  },
                  {
                    "type": "metric",
                    "x": 12,
                    "y": 0,
                    "width": 12,
                    "height": 6,
                    "properties": {
                      "title": "Lambda Duration",
                      "region": "${AWS::Region}",
                      "view": "timeSeries",
                      "stacked": false,
                      "metrics": [
                        [ "AWS/Lambda", "Duration", "FunctionName", "${AiCameraFunctionName}", { "stat": "Average" } ],
                        [ ".", ".", ".", "${QuizGenerateFunctionName}", { "stat": "Average" } ],
                        [ ".", ".", ".", "${MiniGameTrashSortResultFunctionName}", { "stat": "Average" } ]
                      ],
                      "period": 300
                    }
                  },
                  {
                    "type": "metric",
                    "x": 0,
                    "y": 6,
                    "width": 12,
                    "height": 6,
                    "properties": {
                      "title": "Lambda Invocations",
                      "region": "${AWS::Region}",
                      "view": "timeSeries",
                      "stacked": false,
                      "metrics": [
                        [ "AWS/Lambda", "Invocations", "FunctionName", "${AiCameraFunctionName}", { "stat": "Sum" } ],
                        [ ".", ".", ".", "${QuizGenerateFunctionName}", { "stat": "Sum" } ],
                        [ ".", ".", ".", "${MiniGameTrashSortResultFunctionName}", { "stat": "Sum" } ]
                      ],
                      "period": 300
                    }
                  },
                  {
                    "type": "metric",
                    "x": 12,
                    "y": 6,
                    "width": 12,
                    "height": 6,
                    "properties": {
                      "title": "WAF Blocked Requests",
                      "region": "${AWS::Region}",
                      "view": "timeSeries",
                      "stacked": false,
                      "metrics": [
                        [ "AWS/WAFV2", "BlockedRequests", "WebACL", "GreenLensApiWebAcl-${sls:stage}", "Region", "${AWS::Region}", "Rule", "ALL", { "stat": "Sum" } ]
                      ],
                      "period": 300
                    }
                  }
                ]
              }
            - AiCameraFunctionName:
                Ref: AiCameraAnalyzeLambdaFunction
              QuizGenerateFunctionName:
                Ref: QuizGenerateLambdaFunction
              MiniGameTrashSortResultFunctionName:
                Ref: MiniGameTrashSortResultLambdaFunction

  Outputs:
    OperationsAlertsTopicArn:
      Description: SNS topic for GreenLens operations alerts.
      Value: ${self:custom.operationsAlertsTopicArn}
    OperationsDashboardName:
      Description: CloudWatch dashboard for GreenLens operations metrics.
      Value: GreenLens-${sls:stage}-Operations
