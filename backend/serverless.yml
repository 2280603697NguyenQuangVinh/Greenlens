service: greenlens-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: dotnet8
  region: ${opt:region, 'ap-southeast-1'}
  stage: ${opt:stage, 'dev'}
  environment:
    CHILD_PROFILES_TABLE_NAME: GreenLens-ChildProfiles
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_APP_CLIENT_ID: ${env:COGNITO_APP_CLIENT_ID}
    COGNITO_APP_CLIENT_SECRET: ${env:COGNITO_APP_CLIENT_SECRET, ''}
    AI_CAMERA_BUCKET_NAME: ${env:AI_CAMERA_BUCKET_NAME}
    BEDROCK_MODEL_ID: ${env:BEDROCK_MODEL_ID, 'amazon.nova-lite-v1:0'}
    BEDROCK_MAX_TOKENS: ${env:BEDROCK_MAX_TOKENS, '180'}
    AI_CAMERA_GUIDANCE_FALLBACK_ENABLED: ${env:AI_CAMERA_GUIDANCE_FALLBACK_ENABLED, 'false'}
    AI_CAMERA_SKIP_BEDROCK_WHEN_FALLBACK_ENABLED: ${env:AI_CAMERA_SKIP_BEDROCK_WHEN_FALLBACK_ENABLED, 'false'}
    AI_CAMERA_USAGE_LIMITER_ENABLED: ${env:AI_CAMERA_USAGE_LIMITER_ENABLED, 'true'}
    AI_CAMERA_USAGE_TABLE_NAME: GreenLens-AiUsage
    AI_CAMERA_PER_MINUTE_LIMIT: ${env:AI_CAMERA_PER_MINUTE_LIMIT, '3'}
    AI_CAMERA_DAILY_LIMIT: ${env:AI_CAMERA_DAILY_LIMIT, '20'}
  apiGateway:
    binaryMediaTypes:
      - multipart/form-data
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
          Resource:
            - Fn::GetAtt:
                - ChildProfilesTable
                - Arn
        - Effect: Allow
          Action:
            - dynamodb:UpdateItem
          Resource:
            - Fn::GetAtt:
                - AiCameraUsageTable
                - Arn
        - Effect: Allow
          Action:
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:AdminInitiateAuth
            - cognito-idp:InitiateAuth
          Resource:
            - Fn::Sub: arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${env:COGNITO_USER_POOL_ID}
        - Effect: Allow
          Action:
            - s3:PutObject
          Resource:
            - Fn::Sub: arn:aws:s3:::${env:AI_CAMERA_BUCKET_NAME}/uploads/*
        - Effect: Allow
          Action:
            - rekognition:DetectLabels
          Resource: "*"
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:Converse
          Resource: "*"

package:
  artifact: bin/Release/net8.0/greenlens-api.zip

functions:
  authRegister:
    handler: GreenLens.Api::GreenLens.Api.Functions.AuthFunction::RegisterAsync
    events:
      - http:
          path: auth/register
          method: post
          cors: true
  authLogin:
    handler: GreenLens.Api::GreenLens.Api.Functions.AuthFunction::LoginAsync
    events:
      - http:
          path: auth/login
          method: post
          cors: true
  authRefresh:
    handler: GreenLens.Api::GreenLens.Api.Functions.AuthFunction::RefreshAsync
    events:
      - http:
          path: auth/refresh
          method: post
          cors: true
  createChildProfile:
    handler: GreenLens.Api::GreenLens.Api.Functions.ChildProfileFunction::CreateAsync
    events:
      - http:
          path: child-profiles
          method: post
          cors: true
          authorizer:
            arn:
              Fn::Sub: arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${env:COGNITO_USER_POOL_ID}
  aiCameraAnalyze:
    handler: GreenLens.Api::GreenLens.Api.Functions.AiCameraFunction::AnalyzeAsync
    events:
      - http:
          path: ai-camera/analyze
          method: post
          cors: true
          authorizer:
            arn:
              Fn::Sub: arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${env:COGNITO_USER_POOL_ID}

resources:
  Resources:
    ChildProfilesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: GreenLens-ChildProfiles
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: childId
            AttributeType: S
          - AttributeName: cognitoSub
            AttributeType: S
        KeySchema:
          - AttributeName: childId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: GSI-cognitoSub
            KeySchema:
              - AttributeName: cognitoSub
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    AiCameraUsageTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: GreenLens-AiUsage
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: quotaKey
            AttributeType: S
        KeySchema:
          - AttributeName: quotaKey
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true

    GreenLensApiWebAcl:
      Type: AWS::WAFv2::WebACL
      Properties:
        Name: GreenLensApiWebAcl-${sls:stage}
        Scope: REGIONAL
        DefaultAction:
          Allow: {}
        VisibilityConfig:
          CloudWatchMetricsEnabled: true
          MetricName: GreenLensApiWebAcl
          SampledRequestsEnabled: true
        Rules:
          - Name: AWSManagedCommonRules
            Priority: 0
            OverrideAction:
              None: {}
            Statement:
              ManagedRuleGroupStatement:
                VendorName: AWS
                Name: AWSManagedRulesCommonRuleSet
            VisibilityConfig:
              CloudWatchMetricsEnabled: true
              MetricName: AWSManagedCommonRules
              SampledRequestsEnabled: true
          - Name: AWSManagedKnownBadInputs
            Priority: 1
            OverrideAction:
              None: {}
            Statement:
              ManagedRuleGroupStatement:
                VendorName: AWS
                Name: AWSManagedRulesKnownBadInputsRuleSet
            VisibilityConfig:
              CloudWatchMetricsEnabled: true
              MetricName: AWSManagedKnownBadInputs
              SampledRequestsEnabled: true
          - Name: AWSManagedAmazonIpReputation
            Priority: 2
            OverrideAction:
              None: {}
            Statement:
              ManagedRuleGroupStatement:
                VendorName: AWS
                Name: AWSManagedRulesAmazonIpReputationList
            VisibilityConfig:
              CloudWatchMetricsEnabled: true
              MetricName: AWSManagedAmazonIpReputation
              SampledRequestsEnabled: true
          - Name: AiCameraAnalyzeIpRateLimit
            Priority: 3
            Action:
              Block: {}
            Statement:
              RateBasedStatement:
                Limit: 100
                AggregateKeyType: IP
                ScopeDownStatement:
                  ByteMatchStatement:
                    SearchString: /ai-camera/analyze
                    FieldToMatch:
                      UriPath: {}
                    TextTransformations:
                      - Priority: 0
                        Type: NONE
                    PositionalConstraint: EXACTLY
            VisibilityConfig:
              CloudWatchMetricsEnabled: true
              MetricName: AiCameraAnalyzeIpRateLimit
              SampledRequestsEnabled: true
          - Name: GlobalIpRateLimit
            Priority: 4
            Action:
              Block: {}
            Statement:
              RateBasedStatement:
                Limit: 300
                AggregateKeyType: IP
            VisibilityConfig:
              CloudWatchMetricsEnabled: true
              MetricName: GlobalIpRateLimit
              SampledRequestsEnabled: true

    GreenLensApiWebAclAssociation:
      Type: AWS::WAFv2::WebACLAssociation
      Properties:
        ResourceArn:
          Fn::Sub:
            - arn:aws:apigateway:${AWS::Region}::/restapis/${RestApiId}/stages/${StageName}
            - RestApiId:
                Ref: ApiGatewayRestApi
              StageName: ${sls:stage}
        WebACLArn:
          Fn::GetAtt:
            - GreenLensApiWebAcl
            - Arn
